<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashClash Web App</title>
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 35px 30px; text-align: center; box-sizing: border-box; }
        
        /* Menu Screen Styling */
        .menu-title { color: #2d3748; margin-bottom: 30px; font-size: 1.8rem; font-weight: bold; }
        .quiz-link-btn { display: block; background: white; border: 1px solid #e2e8f0; color: #4a5568; padding: 16px 20px; margin-bottom: 12px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 1.05rem; text-align: left; cursor: pointer; transition: all 0.2s; }
        .quiz-link-btn:hover { background: #edf2f7; border-color: #cbd5e0; }
        
        /* Flashcard Screen Styling (Hidden by Default) */
        #flashcard-screen { display: none; width: 100%; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #718096; text-decoration: none; font-weight: bold; cursor: pointer; background: none; border: none; font-size: 1rem; }
        .progress { font-size: 0.85rem; font-weight: 600; color: #718096; margin-bottom: 15px; background: #f4f7f6; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .question-box { font-size: 1.25rem; font-weight: 500; margin-bottom: 30px; min-height: 60px; display: flex; align-items: center; justify-content: center; color: #2d3748; }
        .answer-box { margin-bottom: 30px; min-height: 64px; display: flex; align-items: center; justify-content: center; }
        .redacted-btn { background: #4a5568; color: white; border: none; padding: 12px 24px; font-size: 0.95rem; font-weight: 600; border-radius: 6px; cursor: pointer; }
        .revealed-command { font-family: monospace; background: #1a202c; color: #38bdf8; padding: 14px 28px; border-radius: 6px; font-size: 1.2rem; font-weight: bold; display: none; }
        .nav-buttons { display: flex; justify-content: space-between; gap: 12px; border-top: 1px solid #e2e8f0; padding-top: 25px; }
        .nav-btn { background: transparent; border: 1px solid #e2e8f0; padding: 10px 16px; border-radius: 6px; cursor: pointer; flex: 1; font-size: 0.95rem; }
        .nav-btn.shuffle { background: #0284c7; color: white; border: none; }
    </style>
</head>
<body>

    <div class="container" id="menu-screen">
        <div class="menu-title">📁 Study Portal</div>
        <button class="quiz-link-btn" onclick="startDeck('set1')">📁 Set 1: Navigation (5 Qs)</button>
        <button class="quiz-link-btn" onclick="startDeck('set4')">📁 Set 4: India States & Capitals (36 Qs)</button>
    </div>

    <div id="flashcard-screen">
        <button class="back-link" onclick="showMenu()">⬅️ Back to Main Menu</button>
        <div class="container">
            <div class="progress" id="progress-tracker">Question 1 of 5</div>
            <div class="question-box" id="question-text">Loading...</div>
            <div class="answer-box">
                <button class="redacted-btn" id="reveal-btn" onclick="revealAnswer()">Reveal Answer</button>
                <div class="revealed-command" id="answer-text"></div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prev-btn" onclick="changeQuestion(-1)">Previous</button>
                <button class="nav-btn shuffle" onclick="shuffleQuestions()">🔀 Shuffle</button>
                <button class="nav-btn" id="next-btn" onclick="changeQuestion(1)">Next</button>
            </div>
        </div>
    </div>

    <script>
        // --- ALL DECK DATA HOUSED HERE ---
        const decks = {
            set1: [
                { question: "To display all the files and directories", answer: "DIR" },
                { question: "To display a particular directory", answer: "DIR <Directoryname.*>" },
                { question: "To display directory structure", answer: "TREE <drive>" },
                { question: "Moving out from the directory", answer: "CD.." },
                { question: "Who is the great Boss of 1975", answer: "B.Samuel Soren" }
            ],
            set4: [
                // --- 28 STATES ---
                { question: "State: Andhra Pradesh", answer: "Amaravati" },
                { question: "State: Arunachal Pradesh", answer: "Itanagar" },
                { question: "State: Assam", answer: "Dispur" },
                { question: "State: Bihar", answer: "Patna" },
                { question: "State: Chhattisgarh", answer: "Raipur" },
                { question: "State: Goa", answer: "Panaji" },
                { question: "State: Gujarat", answer: "Gandhinagar" },
                { question: "State: Haryana", answer: "Chandigarh" },
                { question: "State: Himachal Pradesh", answer: "Shimla" },
                { question: "State: Jharkhand", answer: "Ranchi" },
                { question: "State: Karnataka", answer: "Bengaluru" },
                { question: "State: Kerala", answer: "Thiruvananthapuram" },
                { question: "State: Madhya Pradesh", answer: "Bhopal" },
                { question: "State: Maharashtra", answer: "Mumbai" },
                { question: "State: Manipur", answer: "Imphal" },
                { question: "State: Meghalaya", answer: "Shillong" },
                { question: "State: Mizoram", answer: "Aizawl" },
                { question: "State: Nagaland", answer: "Kohima" },
                { question: "State: Odisha", answer: "Bhubaneswar" },
                { question: "State: Punjab", answer: "Chandigarh" },
                { question: "State: Rajasthan", answer: "Jaipur" },
                { question: "State: Sikkim", answer: "Gangtok" },
                { question: "State: Tamil Nadu", answer: "Chennai" },
                { question: "State: Telangana", answer: "Hyderabad" },
                { question: "State: Tripura", answer: "Agartala" },
                { question: "State: Uttar Pradesh", answer: "Lucknow" },
                { question: "State: Uttarakhand", answer: "Dehradun" },
                { question: "State: West Bengal", answer: "Kolkata" },
                // --- 8 UNION TERRITORIES ---
                { question: "Union Territory: Andaman & Nicobar Islands", answer: "Sri Vijaya Puram" },
                { question: "Union Territory: Chandigarh", answer: "Chandigarh" },
                { question: "Union Territory: Dadra & Nagar Haveli and Daman & Diu", answer: "Daman" },
                { question: "Union Territory: Delhi", answer: "New Delhi" },
                { question: "Union Territory: Jammu and Kashmir", answer: "Srinagar (Summer) / Jammu (Winter)" },
                { question: "Union Territory: Lakshadweep", answer: "Kavaratti" },
                { question: "Union Territory: Puducherry", answer: "Puducherry" },
                { question: "Union Territory: Ladakh", answer: "Leh (Summer) / Kargil (Winter)" }
            ]
        };

        let activeDeck = [];
        let currentIndex = 0;

        // --- SCREEN NAVIGATION ---
        function startDeck(deckName) {
            activeDeck = [...decks[deckName]]; // Copy selected deck data
            currentIndex = 0;
            
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("flashcard-screen").style.display = "block";
            
            loadQuestion(currentIndex);
        }

        function showMenu() {
            document.getElementById("flashcard-screen").style.display = "none";
            document.getElementById("menu-screen").style.display = "block";
        }

        // --- GAMEPLAY CORE LOGIC ---
        function loadQuestion(index) {
            document.getElementById("progress-tracker").innerText = `Question ${index + 1} of ${activeDeck.length}`;
            document.getElementById("question-text").innerText = activeDeck[index].question;
            document.getElementById("answer-text").innerText = activeDeck[index].answer;
            
            document.getElementById("reveal-btn").style.display = "block";
            document.getElementById("answer-text").style.display = "none";
            
            document.getElementById("prev-btn").disabled = (index === 0);
            document.getElementById("next-btn").disabled = (index === activeDeck.length - 1);
        }

        function revealAnswer() {
            document.getElementById("reveal-btn").style.display = "none";
            document.getElementById("answer-text").style.display = "block";
        }

        function changeQuestion(dir) { 
            currentIndex += dir; 
            loadQuestion(currentIndex); 
        }

        function shuffleQuestions() {
            for (let i = activeDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [activeDeck[i], activeDeck[j]] = [activeDeck[j], activeDeck[i]];
            }
            currentIndex = 0; 
            loadQuestion(currentIndex);
        }
    </script>
</body>
</html>

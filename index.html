<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlashClash Pro</title>
    <style>
        /* Modern Premium Dark Theme Variables */
        :root {
            --bg-main: #0f172a;       /* Deep Slate Black */
            --bg-card: #1e293b;       /* Dark Navy Card Base */
            --border-glow: #334155;   /* Subtle Border */
            --text-primary: #f8fafc;  /* Clean Off-White */
            --text-muted: #94a3b8;    /* Muted Blue-Grey */
            --accent-blue: #38bdf8;   /* Electric Sky Blue */
            --accent-hover: #0284c7;  /* Deep Sky Blue */
            --bg-command: #0b0f19;    /* Pure Black for monospace answer box */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 16px; 
        }

        .container { 
            width: 100%; 
            max-width: 440px; 
            background: var(--bg-card); 
            border: 1px solid var(--border-glow);
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            padding: 30px 24px; 
            text-align: center; 
        }
        
        /* Menu Screen Styling */
        .menu-title { 
            color: var(--text-primary); 
            margin-bottom: 24px; 
            font-size: 1.6rem; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        .menu-title span {
            color: var(--accent-blue);
        }

        .quiz-link-btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border-glow); 
            color: var(--text-primary); 
            padding: 18px 20px; 
            margin-bottom: 14px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 1.05rem; 
            text-align: left; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            width: 100%;
        }

        .quiz-link-btn:active { 
            background: rgba(56, 189, 248, 0.1); 
            border-color: var(--accent-blue); 
            transform: scale(0.98);
        }
        
        /* Flashcard Screen Styling */
        #flashcard-screen { display: none; width: 100%; max-width: 440px; }
        
        .back-link { 
            display: inline-flex;
            align-items: center;
            margin-bottom: 16px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-weight: 600; 
            cursor: pointer; 
            background: none; 
            border: none; 
            font-size: 0.95rem; 
            padding: 8px 0;
        }

        .back-link:active {
            color: var(--text-primary);
        }

        .progress { 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: var(--accent-blue); 
            margin-bottom: 20px; 
            background: rgba(56, 189, 248, 0.1); 
            padding: 6px 14px; 
            border-radius: 20px; 
            display: inline-block; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .question-box { 
            font-size: 1.35rem; 
            font-weight: 600; 
            line-height: 1.5;
            margin-bottom: 30px; 
            min-height: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-primary); 
        }

        .answer-box { 
            margin-bottom: 35px; 
            min-height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .redacted-btn { 
            background: var(--accent-blue); 
            color: var(--bg-main); 
            border: none; 
            padding: 14px 28px; 
            font-size: 1rem; 
            font-weight: 700; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 100%;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.25);
            transition: background 0.15s ease;
        }

        .redacted-btn:active { 
            background: var(--accent-hover); 
        }

        .revealed-command { 
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; 
            background: var(--bg-command); 
            color: var(--accent-blue); 
            padding: 16px; 
            border-radius: 10px; 
            font-size: 1.2rem; 
            font-weight: 700; 
            display: none; 
            width: 100%;
            border: 1px solid rgba(56, 189, 248, 0.2);
            word-break: break-word;
        }

        .nav-buttons { 
            display: flex; 
            justify-content: space-between; 
            gap: 12px; 
            border-top: 1px solid var(--border-glow); 
            padding-top: 25px; 
        }

        .nav-btn { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--border-glow); 
            color: var(--text-primary);
            padding: 14px 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            flex: 1; 
            font-size: 0.95rem; 
            font-weight: 600;
        }

        .nav-btn:active:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .nav-btn.shuffle { 
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-glow);
            color: var(--text-muted);
            flex: 0.8;
        }
        
        .nav-btn.shuffle:active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <div class="container" id="menu-screen">
        <div class="menu-title">FlashClash <span>Portal</span></div>
        <button class="quiz-link-btn" onclick="startDeck('set1')">
            <span>📁 Set 1: Navigation</span>
            <span style="color: var(--text-muted); font-size: 0.85rem;">5 Qs →</span>
        </button>
        <button class="quiz-link-btn" onclick="startDeck('set4')">
            <span>📁 Set 4: India States & UTs</span>
            <span style="color: var(--text-muted); font-size: 0.85rem;">36 Qs →</span>
        </button>
    </div>

    <div id="flashcard-screen">
        <button class="back-link" onclick="showMenu()">🏠 Back to Portals</button>
        <div class="container">
            <div class="progress" id="progress-tracker">Question 1 of 5</div>
            <div class="question-box" id="question-text">Loading...</div>
            <div class="answer-box">
                <button class="redacted-btn" id="reveal-btn" onclick="revealAnswer()">Reveal Answer</button>
                <div class="revealed-command" id="answer-text"></div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prev-btn" onclick="changeQuestion(-1)">Prev</button>
                <button class="nav-btn shuffle" onclick="shuffleQuestions()">🔀</button>
                <button class="nav-btn" id="next-btn" onclick="changeQuestion(1)">Next</button>
            </div>
        </div>
    </div>

    <script>
        const decks = {
            set1: [
                { question: "To display all the files and directories", answer: "DIR" },
                { question: "To display a particular directory", answer: "DIR <Directoryname.*>" },
                { question: "To display directory structure", answer: "TREE <drive>" },
                { question: "Moving out from the directory", answer: "CD.." },
                { question: "Who is the great Boss of 1975", answer: "B.Samuel Soren" }
            ],
            set4: [
                { question: "State: Andhra Pradesh", answer: "Amaravati" },
                { question: "State: Arunachal Pradesh", answer: "Itanagar" },
                { question: "State: Assam", answer: "Dispur" },
                { question: "State: Bihar", answer: "Patna" },
                { question: "State: Chhattisgarh", answer: "Raipur" },
                { question: "State: Goa", answer: "Panaji" },
                { question: "State: Gujarat", answer: "Gandhinagar" },
                { question: "State: Haryana", answer: "Chandigarh" },
                { question: "State: Himachal Pradesh", answer: "Shimla" },
                { question: "State: Jharkhand", answer: "Ranchi" },
                { question: "State: Karnataka", answer: "Bengaluru" },
                { question: "State: Kerala", answer: "Thiruvananthapuram" },
                { question: "State: Madhya Pradesh", answer: "Bhopal" },
                { question: "State: Maharashtra", answer: "Mumbai" },
                { question: "State: Manipur", answer: "Imphal" },
                { question: "State: Meghalaya", answer: "Shillong" },
                { question: "State: Mizoram", answer: "Aizawl" },
                { question: "State: Nagaland", answer: "Kohima" },
                { question: "State: Odisha", answer: "Bhubaneswar" },
                { question: "State: Punjab", answer: "Chandigarh" },
                { question: "State: Rajasthan", answer: "Jaipur" },
                { question: "State: Sikkim", answer: "Gangtok" },
                { question: "State: Tamil Nadu", answer: "Chennai" },
                { question: "State: Telangana", answer: "Hyderabad" },
                { question: "State: Tripura", answer: "Agartala" },
                { question: "State: Uttar Pradesh", answer: "Lucknow" },
                { question: "State: Uttarakhand", answer: "Dehradun" },
                { question: "State: West Bengal", answer: "Kolkata" },
                { question: "Union Territory: Andaman & Nicobar Islands", answer: "Sri Vijaya Puram" },
                { question: "Union Territory: Chandigarh", answer: "Chandigarh" },
                { question: "Union Territory: Dadra & Nagar Haveli and Daman & Diu", answer: "Daman" },
                { question: "Union Territory: Delhi", answer: "New Delhi" },
                { question: "Union Territory: Jammu and Kashmir", answer: "Srinagar / Jammu" },
                { question: "Union Territory: Lakshadweep", answer: "Kavaratti" },
                { question: "Union Territory: Puducherry", answer: "Puducherry" },
                { question: "Union Territory: Ladakh", answer: "Leh / Kargil" }
            ]
        };

        let activeDeck = [];
        let currentIndex = 0;

        function startDeck(deckName) {
            activeDeck = [...decks[deckName]];
            currentIndex = 0;
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("flashcard-screen").style.display = "block";
            loadQuestion(currentIndex);
        }

        function showMenu() {
            document.getElementById("flashcard-screen").style.display = "none";
            document.getElementById("menu-screen").style.display = "block";
        }

        function loadQuestion(index) {
            document.getElementById("progress-tracker").innerText = `Question ${index + 1} of ${activeDeck.length}`;
            document.getElementById("question-text").innerText = activeDeck[index].question;
            document.getElementById("answer-text").innerText = activeDeck[index].answer;
            
            document.getElementById("reveal-btn").style.display = "block";
            document.getElementById("answer-text").style.display = "none";
            
            document.getElementById("prev-btn").disabled = (index === 0);
            document.getElementById("next-btn").disabled = (index === activeDeck.length - 1);
        }

        function revealAnswer() {
            document.getElementById("reveal-btn").style.display = "none";
            document.getElementById("answer-text").style.display = "block";
        }

        function changeQuestion(dir) { 
            currentIndex += dir; 
            loadQuestion(currentIndex); 
        }

        function shuffleQuestions() {
            for (let i = activeDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [activeDeck[i], activeDeck[j]] = [activeDeck[j], activeDeck[i]];
            }
            currentIndex = 0; 
            loadQuestion(currentIndex);
        }
    </script>
</body>
</html>
